<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Picker - Bootstrap 5 Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 16px; }
        #mapCanvas { width: 100%; height: 350px; border-radius: 0 0 0.375rem 0.375rem; }
        .location-card { border-radius: 0.75rem; overflow: hidden; }
    </style>
</head>
<body>
<div class="container-fluid px-0">
    <div class="card location-card shadow-sm">
        <div class="card-header bg-white py-3">
            <h5 class="card-title mb-0">
                <i class="bi bi-geo-alt-fill text-primary me-2"></i>
                Select Location
            </h5>
        </div>
        <div class="card-body">
            <div class="row g-2 mb-3">
                <div class="col-md-7">
                    <div class="input-group">
                        <input type="text" class="form-control" id="address"
                               placeholder="Search for an address..."
                               onkeyup="return keyup(event)">
                        <button class="btn btn-primary" type="button" onclick="codeAddress();">
                            <i class="bi bi-search me-1"></i> Search
                        </button>
                    </div>
                </div>
                <div class="col-md-5">
                    <button class="btn btn-outline-secondary w-100" id="current_location_btn">
                        <i class="bi bi-crosshair me-1"></i> My Current Location
                    </button>
                </div>
            </div>
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="lati" placeholder="Latitude"
                               onkeyup="return keyupl(event)">
                        <label>Latitude</label>
                    </div>
                </div>
                <div class="col-6">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="longi" placeholder="Longitude"
                               onkeyup="return keyupl(event)">
                        <label>Longitude</label>
                    </div>
                </div>
            </div>
        </div>
        <div id="markerStatus" class="px-3 pb-2 text-primary small" style="display:none;"></div>
        <div id="mapCanvas"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAqPAlqD2AE9wvm2Ou19B8dqiD7FVUhyC4"></script>
<script>
var geocoder, map, marker, infoWindow;
var startLat = 24.72823802423595;
var startLng = 46.76216150781249;

function geocodePosition(pos) {
    geocoder.geocode({latLng: pos}, function(responses) {
        if (responses && responses.length > 0) {
            document.getElementById('address').value = responses[0].formatted_address;
        }
    });
}
function updateMarkerPosition(latLng) {
    document.getElementById('lati').value = latLng.lat();
    document.getElementById('longi').value = latLng.lng();
}
function initialize() {
    geocoder = new google.maps.Geocoder();
    var latLng = new google.maps.LatLng(startLat, startLng);
    map = new google.maps.Map(document.getElementById('mapCanvas'), {
        zoom: 8, center: latLng, mapTypeId: google.maps.MapTypeId.ROADMAP
    });
    marker = new google.maps.Marker({position: latLng, title: 'Your Position', map: map, draggable: true});
    infoWindow = new google.maps.InfoWindow();
    updateMarkerPosition(latLng);
    geocodePosition(latLng);
    google.maps.event.addListener(marker, 'drag', function() {
        updateMarkerPosition(marker.getPosition());
    });
    google.maps.event.addListener(marker, 'dragend', function() {
        geocodePosition(marker.getPosition());
    });
}
function codeAddress() {
    var address = document.getElementById("address").value;
    geocoder.geocode({address: address}, function(results, status) {
        if (status == google.maps.GeocoderStatus.OK) {
            map.setCenter(results[0].geometry.location);
            document.getElementById("lati").value = results[0].geometry.location.lat();
            document.getElementById("longi").value = results[0].geometry.location.lng();
            marker.setPosition(results[0].geometry.location);
        } else {
            alert("Geocode was not successful: " + status);
        }
    });
}
function post_value() {
    var latLng = new google.maps.LatLng(
        document.getElementById("lati").value,
        document.getElementById("longi").value
    );
    map.setCenter(latLng);
    marker.setPosition(latLng);
}
function keyup(e) { if (e.keyCode == 13) codeAddress(); return false; }
function keyupl(e) { if (e.keyCode == 13) post_value(); return false; }

document.getElementById('current_location_btn').addEventListener('click', function() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            var pos = { lat: position.coords.latitude, lng: position.coords.longitude };
            geocodePosition(pos);
            marker.setPosition(pos);
            document.getElementById("lati").value = pos.lat;
            document.getElementById("longi").value = pos.lng;
            map.setCenter(pos);
        });
    }
});

google.maps.event.addDomListener(window, 'load', initialize);
</script>
</body>
</html>
