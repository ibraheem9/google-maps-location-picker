<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Picker - Vue 3 Demo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0fdf4; color: #1e293b; padding: 16px; }
        .location-picker { max-width: 100%; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #e2e8f0; }
        .picker-header { padding: 14px 18px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
        .picker-header h2 { font-size: 16px; font-weight: 700; color: #166534; }
        .status-badge { padding: 4px 10px; border-radius: 9999px; font-size: 11px; font-weight: 600; background: #dcfce7; color: #166534; }
        .controls { padding: 14px 18px; }
        .search-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .search-group input { flex: 1; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; outline: none; transition: border-color 0.2s; }
        .search-group input:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.1); }
        .btn { padding: 9px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-search { background: #22c55e; color: white; }
        .btn-search:hover { background: #16a34a; }
        .btn-location { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .btn-location:hover { background: #dcfce7; }
        .coord-row { display: flex; gap: 10px; }
        .coord-group { flex: 1; }
        .coord-group label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 4px; }
        .coord-group input { width: 100%; padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; font-family: monospace; background: #f8fafc; }
        #mapCanvas { width: 100%; height: 350px; }
    </style>
</head>
<body>
<div id="app">
    <div class="location-picker">
        <div class="picker-header">
            <h2>&#128205; Vue Location Picker</h2>
            <span class="status-badge">{{ status }}</span>
        </div>
        <div class="controls">
            <div class="search-group">
                <input type="text" v-model="address" @keyup.enter="searchAddress" placeholder="Search for an address...">
                <button class="btn btn-search" @click="searchAddress">Search</button>
                <button class="btn btn-location" @click="getCurrentLocation">My Location</button>
            </div>
            <div class="coord-row">
                <div class="coord-group">
                    <label>Latitude</label>
                    <input type="text" v-model="lat" @keyup.enter="goToCoords" readonly>
                </div>
                <div class="coord-group">
                    <label>Longitude</label>
                    <input type="text" v-model="lng" @keyup.enter="goToCoords" readonly>
                </div>
            </div>
        </div>
        <div id="mapCanvas"></div>
    </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAqPAlqD2AE9wvm2Ou19B8dqiD7FVUhyC4"></script>
<script>
const { createApp, ref, onMounted } = Vue;

createApp({
    setup() {
        const lat = ref('24.728238');
        const lng = ref('46.762162');
        const address = ref('');
        const status = ref('Ready');
        let map = null, marker = null, geocoder = null;

        function initMap() {
            geocoder = new google.maps.Geocoder();
            const center = new google.maps.LatLng(24.72823802423595, 46.76216150781249);
            map = new google.maps.Map(document.getElementById('mapCanvas'), {
                zoom: 8, center: center, mapTypeId: google.maps.MapTypeId.ROADMAP
            });
            marker = new google.maps.Marker({ position: center, map: map, draggable: true, title: 'Your Position' });
            geocodePosition(center);

            google.maps.event.addListener(marker, 'drag', function() {
                status.value = 'Dragging...';
                const pos = marker.getPosition();
                lat.value = pos.lat().toFixed(6);
                lng.value = pos.lng().toFixed(6);
            });
            google.maps.event.addListener(marker, 'dragend', function() {
                status.value = 'Ready';
                geocodePosition(marker.getPosition());
            });
        }

        function geocodePosition(pos) {
            geocoder.geocode({ latLng: pos }, function(results) {
                if (results && results.length > 0) {
                    address.value = results[0].formatted_address;
                }
            });
        }

        function searchAddress() {
            if (!address.value) return;
            status.value = 'Searching...';
            geocoder.geocode({ address: address.value }, function(results, s) {
                if (s === google.maps.GeocoderStatus.OK) {
                    const loc = results[0].geometry.location;
                    map.setCenter(loc);
                    marker.setPosition(loc);
                    lat.value = loc.lat().toFixed(6);
                    lng.value = loc.lng().toFixed(6);
                    status.value = 'Ready';
                } else {
                    status.value = 'Not found';
                    alert('Geocode was not successful: ' + s);
                }
            });
        }

        function getCurrentLocation() {
            if (navigator.geolocation) {
                status.value = 'Locating...';
                navigator.geolocation.getCurrentPosition(function(position) {
                    const pos = { lat: position.coords.latitude, lng: position.coords.longitude };
                    map.setCenter(pos);
                    marker.setPosition(pos);
                    lat.value = pos.lat.toFixed(6);
                    lng.value = pos.lng.toFixed(6);
                    geocodePosition(pos);
                    status.value = 'Ready';
                });
            }
        }

        function goToCoords() {
            const latLng = new google.maps.LatLng(parseFloat(lat.value), parseFloat(lng.value));
            map.setCenter(latLng);
            marker.setPosition(latLng);
        }

        onMounted(() => { initMap(); });

        return { lat, lng, address, status, searchAddress, getCurrentLocation, goToCoords };
    }
}).mount('#app');
</script>
</body>
</html>
